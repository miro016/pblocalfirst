name: Publish to npm (manual fallback)

# Normal releases are fully automated — see release-please.yml (merge the
# release PR on main and the package is tagged, released and published).
# This workflow is a manual escape hatch: run it from the Actions tab to
# publish whatever is on the selected ref (e.g. to retry a failed publish).

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
