name: Release

# Fully automated releases via release-please:
#   - every push to main updates (or opens) a "release PR" that bumps the
#     version in package.json, updates CHANGELOG.md and stages a tag
#   - merging that PR creates the git tag + GitHub Release
#   - the publish job below then builds and publishes to npm with provenance
#
# Version bumps are derived from conventional commit messages on main:
#   fix: ... -> patch, feat: ... -> minor, feat!: / BREAKING CHANGE -> major
# (chore:/ci:/docs:/refactor: don't trigger a release on their own.)

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
